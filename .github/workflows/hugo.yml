name: UUID-sikring og CF Pages-rebuild

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  repository_dispatch:
    types: [module-updated]

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  # Kjøres kun ved push – sjekker og injiserer UUID-er i frontmatter.
  # CF Pages fanger opp pushen automatisk og bygger nettstedet.
  uuid-check:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    concurrency:
      group: "uuid"
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sikre UUID-er i frontmatter
        run: |
          python3 .github/scripts/ensure-uuids.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --staged --quiet; then
            echo "Ingen endringer – alle UUID-er var på plass"
          else
            git commit -m "Auto: legg til manglende UUID-er i frontmatter [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push-forsøk $i feilet, prøver igjen..."
              sleep 3
            done
          fi

  # Kjøres ved repository_dispatch fra modulrepoer eller manuell workflow_dispatch.
  # Trigger CF Pages til å bygge med siste modulversjoner (inkl. injisert lastmod).
  trigger-cf-pages:
    if: (github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch') && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages build
        run: |
          curl -s -X POST "${{ secrets.CF_PAGES_DEPLOY_HOOK }}"
          echo "CF Pages build trigget (kilde: ${{ github.event.client_payload.source || 'manuell' }})."
